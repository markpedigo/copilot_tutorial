<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Math Mini-Game</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <header>
      <h1>Math Mini-Game</h1>
      <p>Answer 5 questions correctly to win!</p>
    </header>

    <section class="game" aria-live="polite">
      <div class="status">
        <div class="score" id="score">Correct: 0 / 5</div>
        <div class="meta">
          <div class="streak" id="streak">Streak: 0</div>
          <div class="best" id="best">Best: —</div>
        </div>
        <div class="question" id="question">Loading...</div>
      </div>

      <form id="answer-form" class="answer-form">
        <label for="answer">Your answer</label>
        <input id="answer" name="answer" type="number" autocomplete="off" required />
        <button type="submit">Submit</button>
      </form>

      <div class="feedback" id="feedback"></div>

      <div class="controls" id="controls" hidden>
        <button id="restart">Play again</button>
        <button id="reset-stats" type="button">Reset stats</button>
      </div>
    </section>

    <footer>
      <p>
        Built as a simple browser game. Reload the page to reset at any time.
      </p>
    </footer>
  </main>

  <script src="streakLogger.js"></script>
  <script src="game.js"></script>
</body>
</html>
